plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// --- НОВЫЙ БЛОК: Чтение ключей для подписи ---
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "com.insar.honda.client"
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.insar.honda.client"
        minSdkVersion 23
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        ndk {
            // Указываем, что нам нужны только 64-битные архитектуры
            abiFilters "arm64-v8a", "x86_64"
        }
        // Добавь это прямо внутрь блока:
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
            }
        }
    }

    // --- НОВЫЙ БЛОК: Конфигурация подписи ---
    signingConfigs {
        release {
            // Читаем из переменных среды GitHub (приоритет) или из файла
            keyAlias System.getenv('KEY_ALIAS') ?: keystoreProperties['keyAlias']
            keyPassword System.getenv('KEY_PASSWORD') ?: keystoreProperties['keyPassword']
            storePassword System.getenv('STORE_PASSWORD') ?: keystoreProperties['storePassword']
            
            // Если мы на GitHub, используем файл, который мы создали через base64
            // Если на Маке, используем путь из key.properties
            storeFile file('upload-keystore.jks')
        }
    }

    buildTypes {
        release {
            // ТЕПЕРЬ ТУТ НЕ DEBUG, А НАШ RELEASE КЛЮЧ
            signingConfig signingConfigs.release
            
            // Эти настройки помогут сжать приложение и убрать лишнее
            minifyEnabled false
            shrinkResources false
        }
    }

    // Добавь это для поддержки 16 КБ
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.multidex:multidex:2.0.1"
}