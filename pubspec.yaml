name: honda_client_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+14

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  # Совместимая пара версий 2022 года:
  firebase_core: 2.15.1
  cloud_firestore: 4.9.1
  firebase_messaging: 14.6.7
  
  shared_preferences: 2.2.3
  cached_network_image: 3.3.0
  http: 1.2.0
  flutter_local_notifications: 16.1.0
  url_launcher: 6.2.1
  change_app_package_name: 1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0 # <--- Добавь это

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  title: "HS service" # <--- Добавь это для отображения под иконкой
  adaptive_icon_background: "#C62828"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_ios: true
flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png

flutter_native_splash:
  color: "#C62828" # Твой фирменный красный фон
  image: assets/images/app_icon.png # Твой логотип по центру
  android_12:
    image: assets/images/app_icon.png
    color: "#C62828"
  fullscreen: true
