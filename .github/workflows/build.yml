name: Build Android App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Берем стабильную версию
          flutter-version: '3.24.0' # Сервер сам скачает свежий Flutter
      # Вот этот шаг создаст файл из твоего секрета:
      - name: Создать google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - name: Восстановить keystore
        run: echo '${{ secrets.KEYSTORE_FILE_BASE64 }}' | base64 --decode > android/app/upload-keystore.jks
      - run: flutter pub get
      - name: Build AppBundle
        run: flutter build appbundle --release
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: android/app/upload-keystore.jks
          # Добавь эти флаги для поддержки 16 КБ:
          ANDROID_GRADLE_ARGS: "-Pandroid.bundle.enableUncompressedNativeLibs=false"
      - uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: build/app/outputs/bundle/release/app-release.aab
          